# LaborLedger — Admin (Next.js BFF)
# Install: sudo cp deploy/nginx/admin.mariosautodetail.com.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/admin.mariosautodetail.com.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d admin.mariosautodetail.com

server {
    listen 80;
    server_name admin.mariosautodetail.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
